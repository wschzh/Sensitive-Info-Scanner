<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>敏感信息扫描工具</title>
<style>
  body { font-family: -apple-system, "Microsoft YaHei", sans-serif; margin: 20px; background: #f5f5f5; color: #333; }
  h1 { font-size: 20px; }
  .card { background: #fff; border-radius: 8px; padding: 16px; margin-bottom: 16px; box-shadow: 0 1px 3px rgba(0,0,0,.1); }
  label { display: inline-block; margin-right: 8px; }
  input[type=text], input[type=number], select { padding: 6px; border: 1px solid #ccc; border-radius: 4px; }
  button { padding: 8px 16px; border: none; border-radius: 4px; background: #3498db; color: #fff; cursor: pointer; margin-right: 8px; }
  button:disabled { background: #aaa; cursor: not-allowed; }
  button.danger { background: #e74c3c; }
  button.ghost { background: #7f8c8d; }
  button.sm { padding: 4px 10px; margin: 0 4px; }
  .progress { width: 100%; height: 18px; background: #eee; border-radius: 9px; overflow: hidden; }
  .progress-bar { height: 100%; background: #3498db; transition: width .2s; width: 0; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { border: 1px solid #ddd; padding: 6px; text-align: left; }
  th { background: #f0f0f0; position: sticky; top: 0; }
  .lv-critical { color: #e74c3c; font-weight: bold; }
  .lv-high { color: #e67e22; font-weight: bold; }
  .lv-medium { color: #b7950b; }
  .lv-low { color: #3498db; }
  .stats span { margin-right: 16px; }
  .muted { color: #888; font-size: 12px; }
  .warn { color: #e67e22; font-weight: bold; }
  .toolbar { margin-bottom: 10px; padding: 8px; background: #fafafa; border-radius: 6px; font-size: 13px; }
  .toolbar select { margin: 0 4px; }
  .pager { margin-top: 10px; text-align: center; color: #666; font-size: 13px; }
  .tabs { display: flex; gap: 4px; margin-bottom: 16px; border-bottom: 2px solid #e0e0e0; }
  .tab { padding: 8px 24px; background: #e0e0e0; border: none; border-radius: 6px 6px 0 0; cursor: pointer; color: #333; margin: 0; }
  .tab.active { background: #3498db; color: #fff; }
  .rule-level-title { font-size: 15px; font-weight: bold; margin: 16px 0 6px; }
  .rule-card { background: #fff; border-left: 4px solid #3498db; padding: 10px 12px; margin-bottom: 8px; border-radius: 4px; box-shadow: 0 1px 2px rgba(0,0,0,.05); }
  .rule-regex { font-family: "SF Mono", Consolas, monospace; background: #f5f5f5; padding: 6px 8px; border-radius: 3px; word-break: break-all; font-size: 12px; margin: 4px 0; }
  .rule-example { font-family: "SF Mono", Consolas, monospace; color: #666; font-size: 12px; word-break: break-all; margin-top: 4px; }
  .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 100; }
  .modal.open { display: flex; align-items: center; justify-content: center; }
  .modal-card { background: #fff; border-radius: 8px; padding: 16px; width: 480px; max-width: 92vw; box-shadow: 0 4px 20px rgba(0,0,0,.2); display: flex; flex-direction: column; }
  .modal-title { font-size: 15px; font-weight: bold; margin-bottom: 8px; }
  .browser-list { overflow: auto; max-height: 50vh; border: 1px solid #eee; border-radius: 4px; }
  .browser-item { padding: 6px 10px; cursor: pointer; font-size: 13px; }
  .browser-item:hover { background: #eef5fb; }
</style>
</head>
<body>
<h1>🔍 敏感信息扫描工具</h1>

<div class="tabs">
  <button class="tab active" data-tab="scan" onclick="switchTab('scan')">扫描</button>
  <button class="tab" data-tab="rules" onclick="switchTab('rules')">规则</button>
</div>

<!-- ===== 扫描页 ===== -->
<div id="tab-scan" class="tab-panel">
<div class="card">
  <div>
    <label>扫描方式:
      <select id="profile" onchange="applyProfilePreset()">
        <option value="full_disk_fast">全盘快速</option>
        <option value="normal">自定义扫描</option>
      </select>
    </label>
  </div>
  <div id="pathRow" style="margin-top:8px"><label>扫描路径: <input type="text" id="path" size="55" placeholder="文件或目录的绝对路径"></label>
    <button type="button" class="ghost sm" onclick="openBrowser()">浏览…</button>
  </div>
  <div id="customOptions" style="margin-top:8px">
    <label>扫描速度:
      <select id="walkEngine">
        <option value="std">标准</option>
        <option value="fastwalk">快速</option>
      </select>
    </label>
    <label><input type="checkbox" id="recursive" checked> 递归子目录</label>
    <label>最大文件(MB): <input type="number" id="maxsize" value="10" style="width:60px"></label>
    级别:
    <label><input type="checkbox" class="lvl" value="critical" checked>严重</label>
    <label><input type="checkbox" class="lvl" value="high" checked>高级</label>
    <label><input type="checkbox" class="lvl" value="medium">中级</label>
    <label><input type="checkbox" class="lvl" value="low">低级</label>
  </div>
  <div id="scanHint" class="muted" style="margin-top:6px"></div>
  <div style="margin-top:10px">
    <button id="btnScan" onclick="startScan()">开始扫描</button>
    <button id="btnStop" class="danger" onclick="stopScan()" disabled>停止</button>
    <button class="ghost" onclick="exportReport('text')">导出 Text</button>
    <button class="ghost" onclick="exportReport('json')">导出 JSON</button>
    <button class="ghost" onclick="exitApp()" style="float:right">退出程序</button>
  </div>
</div>

<div class="card">
  <div class="progress"><div class="progress-bar" id="bar"></div></div>
  <div class="stats" id="stats" style="margin-top:8px">就绪</div>
</div>

<div class="card">
  <div class="toolbar">
    级别:
    <label><input type="radio" name="flevel" value="all" checked>全部</label>
    <label><input type="radio" name="flevel" value="critical">严重</label>
    <label><input type="radio" name="flevel" value="high">高级</label>
    <label><input type="radio" name="flevel" value="medium">中级</label>
    <label><input type="radio" name="flevel" value="low">低级</label>
    类型:<select id="ftype">
      <option value="all">全部</option>
      <option>私钥</option><option>API密钥</option><option>数据库连接字符串</option>
      <option>身份证号</option><option>银行卡号</option><option>密码</option><option>JWT令牌</option>
      <option>手机号码</option><option>邮箱地址</option><option>IP地址</option>
      <option>用户名</option><option>URL地址</option><option>内部服务器路径</option>
    </select>
    搜索:<input type="text" id="fsearch" size="22" placeholder="文件名 / 内容 / 匹配">
    <span id="fcount" class="muted"></span>
    <button type="button" class="danger sm" id="btnDel" onclick="deleteSelected()" disabled style="margin-left:8px">删除选中</button>
    <span id="selCount" class="muted"></span>
  </div>
  <table>
    <thead><tr><th style="width:28px;text-align:center"><input type="checkbox" id="selAll" onclick="toggleAll(this)" title="全选当前页"></th><th>级别</th><th>类型</th><th>文件</th><th>行</th><th>匹配内容</th></tr></thead>
    <tbody id="results"></tbody>
  </table>
  <div class="pager" id="pager"></div>
</div>
</div>

<!-- ===== 规则页 ===== -->
<div id="tab-rules" class="tab-panel" style="display:none">
  <div class="card">
    <div style="margin-bottom:10px">
      <b>敏感信息规则库</b>
      <span class="muted">查看当前内置的正则规则（按级别分组）；规则的增删改查功能规划中。</span>
    </div>
    <div id="rulesList"><div class="muted">加载中…</div></div>
  </div>
</div>

<div style="text-align:center;color:#999;font-size:13px;padding:8px 0 4px">powered by cz</div>

<!-- 目录选择弹层 -->
<div id="browser" class="modal">
  <div class="modal-card">
    <div class="modal-title">选择目录
      <button type="button" class="ghost sm" style="float:right" onclick="closeBrowser()">✕</button>
    </div>
    <div id="browserPath" class="muted" style="margin:6px 0;word-break:break-all"></div>
    <div id="browserList" class="browser-list"></div>
    <div style="margin-top:10px;text-align:right">
      <button type="button" class="ghost" onclick="closeBrowser()">取消</button>
      <button type="button" onclick="pickDir()">选择此目录</button>
    </div>
  </div>
</div>

<script>
const lvName = {critical:'严重', high:'高级', medium:'中级', low:'低级'};
const lvColor = {critical:'#e74c3c', high:'#e67e22', medium:'#b7950b', low:'#3498db'};
const PAGE_SIZE = 200;

let scanning = false;
let pageResults = [];
let total = 0;
let curPage = 1;
let filterLevel = 'all';
let filterType = 'all';
let filterKeyword = '';
let rulesLoaded = false;
let lastResultRefresh = 0;
let refreshingResults = false;
let lastScannedCount = 0;
let lastProgressChangeAt = Date.now();
applyProfilePreset();

// ===== Tab 切换 =====
function switchTab(name) {
  document.querySelectorAll('.tab-panel').forEach(p => p.style.display = 'none');
  const panel = document.getElementById('tab-' + name);
  if (panel) panel.style.display = '';
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === name));
  if (name === 'rules' && !rulesLoaded) loadRules();
}

// ===== 规则页 =====
async function loadRules() {
  const el = document.getElementById('rulesList');
  el.innerHTML = '<div class="muted">加载中…</div>';
  try {
    const r = await (await fetch('/api/patterns')).json();
    renderRules(r.patterns || []);
    rulesLoaded = true;
  } catch (e) {
    el.innerHTML = '<div class="muted">加载失败: ' + escapeHtml(String(e)) + '</div>';
  }
}

function renderRules(patterns) {
  const order = ['critical', 'high', 'medium', 'low'];
  const byLevel = {};
  for (const p of patterns) (byLevel[p.level] = byLevel[p.level] || []).push(p);
  const el = document.getElementById('rulesList');
  let html = `<div class="muted">共 ${patterns.length} 条规则，按级别分组如下：</div>`;
  for (const lv of order) {
    const items = byLevel[lv] || [];
    if (!items.length) continue;
    html += `<div class="rule-level-title" style="color:${lvColor[lv]}">【${lvName[lv]}】${items.length} 条</div>`;
    for (const p of items) {
      const examples = (p.examples || []).map(e => escapeHtml(e)).join(' &nbsp;·&nbsp; ');
      html += `<div class="rule-card" style="border-left-color:${lvColor[lv]}">` +
        `<div><b>${escapeHtml(p.name)}</b>${p.cross_line ? ' <span class="muted">（跨行匹配）</span>' : ''}</div>` +
        (p.description ? `<div class="muted">${escapeHtml(p.description)}</div>` : '') +
        `<div class="rule-regex">${escapeHtml(p.pattern)}</div>` +
        (examples ? `<div class="rule-example">示例：${examples}</div>` : '') +
        `</div>`;
    }
  }
  el.innerHTML = html || '<div class="muted">无规则</div>';
}

// ===== 扫描页筛选事件 =====
document.querySelectorAll('input[name=flevel]').forEach(r =>
  r.addEventListener('change', () => { filterLevel = r.value; loadPage(1); }));
document.getElementById('ftype').addEventListener('change', e => { filterType = e.target.value; loadPage(1); });
let searchTimer = null;
document.getElementById('fsearch').addEventListener('input', e => {
  filterKeyword = e.target.value.trim();
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => loadPage(1), 300);
});

async function startScan() {
  const profile = document.getElementById('profile').value;
  const path = document.getElementById('path').value.trim();
  if (profile !== 'full_disk_fast' && !path) { alert('请输入扫描路径'); return; }
  const levels = profile === 'full_disk_fast'
    ? ['critical', 'high']
    : [...document.querySelectorAll('.lvl:checked')].map(e => e.value);
  const body = {
    path: profile === 'full_disk_fast' ? '' : path,
    recursive: profile === 'full_disk_fast' ? true : document.getElementById('recursive').checked,
    max_size: parseInt(document.getElementById('maxsize').value) * 1024 * 1024,
    profile,
    walk_engine: profile === 'full_disk_fast' ? 'fastwalk' : document.getElementById('walkEngine').value,
    levels
  };
  document.getElementById('btnScan').disabled = true;
  const res = await fetch('/api/scan', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body)});
  if (!res.ok) { document.getElementById('btnScan').disabled = false; alert(await res.text()); return; }
  scanning = true;
  pageResults = []; total = 0; curPage = 1;
  lastResultRefresh = 0;
  lastScannedCount = 0;
  lastProgressChangeAt = Date.now();
  renderResults();
  document.getElementById('btnStop').disabled = false;
  poll();
}

function stopScan() { fetch('/api/stop', {method:'POST'}); }

function exitApp() {
  if (!confirm('确定退出程序？退出后需重新运行才能再次使用。')) return;
  fetch('/api/exit', {method:'POST'}).catch(()=>{}).finally(()=>{
    document.body.innerHTML = '<div style="text-align:center;padding:60px;color:#888;font-size:15px">程序已退出，可关闭此页面。<br><span class="muted">如需再次使用，请重新运行程序。</span></div>';
  });
}

async function poll() {
  if (!scanning) return;
  try {
    const r = await fetchJSON('/api/progress', {}, 4000);
    document.getElementById('bar').style.width = r.progress + '%';
    const trunc = r.stats && r.stats.truncated_count > 0
      ? ` <span class="warn">（已截断 ${r.stats.truncated_count} 条，仅保留高优先级）</span>` : '';
    if (r.scanned !== lastScannedCount) {
      lastScannedCount = r.scanned;
      lastProgressChangeAt = Date.now();
    }
    const stallSec = Math.floor((Date.now() - lastProgressChangeAt) / 1000);
    const stall = stallSec >= 15
      ? `<span class="warn">已 ${stallSec}s 无新增，可能正在处理大文件或受权限/磁盘 IO 影响</span>` : '';
    document.getElementById('stats').innerHTML =
      `<span>进度: ${r.progress}%</span><span class="muted">${escapeHtml(r.current_file||'')}</span>` +
      `<span>已扫描: ${r.scanned}/${r.total||'?'}</span>` +
      `<span>已跳过: ${(r.stats.skipped_files||0)} 文件 / ${(r.stats.skipped_dirs||0)} 目录</span>` +
      `<span>问题: ${r.stats.total_issues}</span>${trunc}${stall}`;
    const now = Date.now();
    if (now - lastResultRefresh > 1000) {
      lastResultRefresh = now;
      loadPageWithOptions(curPage, {preserveOnError: true});
    }
    if (!r.scanning) {
      scanning = false;
      document.getElementById('btnScan').disabled = false;
      document.getElementById('btnStop').disabled = true;
      await loadPage(1);
      return;
    }
  } catch(e) {}
  setTimeout(poll, 500);
}

function applyProfilePreset() {
  const profile = document.getElementById('profile').value;
  const levels = [...document.querySelectorAll('.lvl')];
  const fullDisk = profile === 'full_disk_fast';
  document.getElementById('pathRow').style.display = fullDisk ? 'none' : '';
  document.getElementById('customOptions').style.display = fullDisk ? 'none' : '';
  if (profile === 'full_disk_fast') {
    levels.forEach(e => e.checked = e.value === 'critical' || e.value === 'high');
    document.getElementById('walkEngine').value = 'fastwalk';
    document.getElementById('maxsize').value = 10;
    document.getElementById('scanHint').textContent = '全盘快速会自动扫描所有可访问盘符，只检查严重/高级问题，并使用快速遍历。';
  } else {
    document.getElementById('scanHint').textContent = '自定义扫描需要选择路径，可调整扫描速度和级别；默认只检查严重/高级问题。';
  }
}

async function loadPage(page) {
  return loadPageWithOptions(page, {});
}

async function loadPageWithOptions(page, opts) {
  if (refreshingResults) return;
  refreshingResults = true;
  curPage = page;
  const params = new URLSearchParams();
  params.set('offset', String((page - 1) * PAGE_SIZE));
  params.set('limit', String(PAGE_SIZE));
  if (filterLevel !== 'all') params.set('level', filterLevel);
  if (filterType !== 'all') params.set('type', filterType);
  if (filterKeyword) params.set('kw', filterKeyword);
  try {
    const r = await fetchJSON('/api/results?' + params.toString(), {}, 5000);
    pageResults = r.results || [];
    total = r.total || 0;
  } catch (e) {
    if (!opts || !opts.preserveOnError) {
      pageResults = []; total = 0;
    }
    document.getElementById('fcount').textContent = `结果刷新失败，已保留当前页`;
    refreshingResults = false;
    return;
  }
  refreshingResults = false;
  renderResults();
}

async function fetchJSON(url, options, timeoutMs) {
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), timeoutMs || 5000);
  try {
    const res = await fetch(url, {...(options || {}), signal: ctrl.signal});
    if (!res.ok) throw new Error(await res.text());
    return await res.json();
  } finally {
    clearTimeout(timer);
  }
}

function renderResults() {
  const tbody = document.getElementById('results');
  const frag = document.createDocumentFragment();
  for (const it of pageResults) {
    const tr = document.createElement('tr');
    tr.innerHTML =
      `<td style="text-align:center"><input type="checkbox" class="row-sel" data-path="${escapeHtml(it.file_path)}"></td>` +
      `<td class="lv-${it.level}">${lvName[it.level]||it.level}</td>` +
      `<td>${escapeHtml(it.pattern_name)}</td>` +
      `<td class="muted" title="${escapeHtml(it.file_path)}">${escapeHtml(shortPath(it.file_path))}</td>` +
      `<td>${it.line_number}</td>` +
      `<td>${escapeHtml(it.matched_text)}</td>`;
    frag.appendChild(tr);
  }
  tbody.innerHTML = '';
  tbody.appendChild(frag);
  const selAll = document.getElementById('selAll');
  if (selAll) selAll.checked = false;
  updateSelState();

  const pages = Math.max(1, Math.ceil(total / PAGE_SIZE));
  if (curPage > pages) curPage = pages;
  document.getElementById('fcount').textContent = `共 ${total} 条`;

  const pager = document.getElementById('pager');
  if (total === 0) {
    pager.innerHTML = scanning ? '<span class="muted">扫描进行中，完成后显示结果…</span>' : '<span class="muted">无匹配结果</span>';
    return;
  }
  pager.innerHTML =
    `<span>第 ${curPage} / ${pages} 页</span>` +
    `<button class="sm" onclick="loadPage(${curPage-1})" ${curPage<=1?'disabled':''}>上一页</button>` +
    `<button class="sm" onclick="loadPage(${curPage+1})" ${curPage>=pages?'disabled':''}>下一页</button>`;
}

// ===== 结果选中 / 删除 =====
document.getElementById('results').addEventListener('change', updateSelState);

function toggleAll(master) {
  document.querySelectorAll('.row-sel').forEach(b => b.checked = master.checked);
  updateSelState();
}

function updateSelState() {
  const boxes = document.querySelectorAll('.row-sel');
  const checked = [...boxes].filter(b => b.checked);
  document.getElementById('btnDel').disabled = checked.length === 0;
  document.getElementById('selCount').textContent = checked.length > 0 ? `已选 ${checked.length} 个` : '';
  const selAll = document.getElementById('selAll');
  if (selAll) selAll.checked = boxes.length > 0 && checked.length === boxes.length;
}

async function deleteSelected() {
  const paths = [...new Set([...document.querySelectorAll('.row-sel:checked')]
    .map(b => b.dataset.path).filter(Boolean))];
  if (paths.length === 0) return;
  const preview = paths.slice(0, 5).join('\n') + (paths.length > 5 ? `\n…等共 ${paths.length} 个文件` : '');
  if (!confirm(`⚠️ 确定删除以下 ${paths.length} 个文件？此操作不可恢复！\n\n${preview}`)) return;
  try {
    const res = await fetch('/api/delete', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({paths})
    });
    const data = await res.json();
    const okCount = data.deleted || 0;
    const failCount = (data.total || 0) - okCount;
    // 后端已同步移除删除结果，刷新当前页以保持分页和统计一致。
    const done = new Set((data.results || []).filter(r => r.ok).map(r => r.path));
    if (done.size > 0) await loadPage(curPage);
    if (failCount > 0) {
      const failed = (data.results || []).filter(r => !r.ok)
        .map(r => `${shortPath(r.path)}: ${r.err}`).join('\n');
      alert(`删除完成：成功 ${okCount} 个，失败 ${failCount} 个。\n\n失败详情：\n${failed}`);
    } else {
      alert(`已删除 ${okCount} 个文件。`);
    }
  } catch (e) {
    alert('删除请求失败: ' + e);
  }
}

// ===== 目录选择器 =====
let browserCurPath = '';

async function openBrowser() {
  document.getElementById('browser').classList.add('open');
  browserCurPath = document.getElementById('path').value.trim();
  await loadBrowser();
}

function closeBrowser() {
  document.getElementById('browser').classList.remove('open');
}

async function loadBrowser() {
  const list = document.getElementById('browserList');
  list.innerHTML = '<div class="muted" style="padding:10px">加载中…</div>';
  let r;
  try {
    r = await (await fetch('/api/browse?path=' + encodeURIComponent(browserCurPath))).json();
  } catch (e) {
    list.innerHTML = '<div class="muted" style="padding:10px">请求失败: ' + escapeHtml(String(e)) + '</div>';
    return;
  }
  document.getElementById('browserPath').textContent = r.path || '（选择起始位置）';
  list.innerHTML = '';
  if (r.parent) {
    const up = document.createElement('div');
    up.className = 'browser-item';
    up.textContent = '📁 ..';
    up.onclick = () => { browserCurPath = r.parent; loadBrowser(); };
    list.appendChild(up);
  }
  if (r.error) {
    const d = document.createElement('div');
    d.className = 'muted'; d.style.padding = '10px';
    d.textContent = r.error;
    list.appendChild(d);
  }
  const dirs = (r.entries || []).filter(e => e.is_dir);
  for (const e of dirs) {
    const div = document.createElement('div');
    div.className = 'browser-item';
    div.textContent = '📁 ' + e.name;
    div.onclick = () => { browserCurPath = e.path; loadBrowser(); };
    div.ondblclick = () => { browserCurPath = e.path; pickDir(); };
    list.appendChild(div);
  }
  if (!r.error && dirs.length === 0) {
    const d = document.createElement('div');
    d.className = 'muted'; d.style.padding = '10px';
    d.textContent = '无子目录';
    list.appendChild(d);
  }
}

function pickDir() {
  if (browserCurPath) {
    document.getElementById('path').value = browserCurPath;
  }
  closeBrowser();
}

function exportReport(fmt) { window.open('/api/report?format=' + fmt); }
function shortPath(p) { p = p||''; return p.length <= 50 ? p : '…' + p.slice(-49); }
function escapeHtml(s) {
  return String(s==null?'':s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
}
</script>
